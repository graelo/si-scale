name: Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # convco needs all history to create the changelog
          fetch-depth: 0
          persist-credentials: false

      - name: Install convco
        run: |
          curl -sSfLO https://github.com/convco/convco/releases/latest/download/convco-ubuntu.zip
          unzip convco-ubuntu.zip
          chmod +x convco

      - name: Generate changelog
        run: |
          ./convco changelog -c .convco --max-versions 1 --include-hidden-sections > CHANGELOG.md
          rm convco convco-ubuntu.zip

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          IS_PRERELEASE: ${{ contains(github.ref, '-') }}
        run: |
          gh release create "${TAG_NAME}" \
            --prerelease="${IS_PRERELEASE}" \
            --title "${TAG_NAME}" \
            --notes-file CHANGELOG.md
