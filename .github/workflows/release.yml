name: Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # convco needs all history to create the changelog
          fetch-depth: 0
          persist-credentials: false

      - name: Install convco
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2.85.0
        with:
          tool: convco@0.7.0

      - name: Generate changelog
        run: |
          convco changelog -c .convco --max-versions 1 > CHANGELOG.md

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          IS_PRERELEASE: ${{ contains(github.ref, '-') }}
        run: |
          gh release create "${TAG_NAME}" \
            --prerelease="${IS_PRERELEASE}" \
            --title "${TAG_NAME}" \
            --notes-file CHANGELOG.md
